name: publish-sdk

on:
  workflow_dispatch:
  push:
    tags:
      - "sdk-v*"

jobs:
  publish-js-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sdk/js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m pip install dist/*.whl
          python -c "from quantum_api_sdk import QuantumApiClient; print(QuantumApiClient.__name__)"

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-pennylane-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdk/pennylane

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build local Python SDK dependency
        run: python -m build ../python

      - name: Build PennyLane package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m pip install ../python/dist/*.whl
          python -m pip install dist/*.whl
          python -c "import quantum_api_pennylane as qap; print(qap.QuantumApiDevice.__name__)"

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/pennylane/dist/
