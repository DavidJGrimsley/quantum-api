name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Portfolio Contract Smoke
        run: uv run pytest tests/test_api_contract.py -k portfolio

      - name: Pytest
        run: |
          uv run pytest --ignore=tests/test_api_contract.py
          uv run pytest tests/test_api_contract.py -k "not portfolio"

      - name: Build package
        run: uv build

      - name: Docker build
        run: docker build -t quantum-api:ci .
