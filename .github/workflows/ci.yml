name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Godot AssetLib export rules
        run: |
          test -f .gitattributes

          required_rules=(
            "* text=auto eol=lf"
            "/** export-ignore"
            "/addons !export-ignore"
            "/addons/** !export-ignore"
          )

          for rule in "${required_rules[@]}"; do
            grep -Fx "$rule" .gitattributes >/dev/null || {
              echo "Missing .gitattributes rule: $rule"
              exit 1
            }
          done

          archive_listing="$(mktemp)"
          git archive --format=tar HEAD | tar -tf - > "$archive_listing"

          if grep -vE '^addons(/|$)' "$archive_listing" > /tmp/archive-invalid.txt; then
            echo "Archive contains paths outside addons/:"
            cat /tmp/archive-invalid.txt
            exit 1
          fi

          grep -q '^addons/quantum_api_client/' "$archive_listing" || {
            echo "Archive is missing addons/quantum_api_client content"
            exit 1
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: >
          uv sync
          --extra dev
          --extra phase5-optimization
          --extra phase5-experiments
          --extra phase5-finance
          --extra phase5-ml
          --extra phase5-nature
          --extra phase5-docs

      - name: Ruff
        run: uv run ruff check .

      - name: Portfolio Contract Smoke
        run: uv run pytest tests/test_api_contract.py -k portfolio

      - name: Pytest
        run: |
          uv run pytest --ignore=tests/test_api_contract.py
          uv run pytest tests/test_api_contract.py -k "not portfolio"

      - name: Build package
        run: uv build

      - name: Docker build
        run: docker build -t quantum-api:ci .
