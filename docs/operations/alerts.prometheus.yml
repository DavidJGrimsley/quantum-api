groups:
  - name: quantum-api-alerts
    rules:
      - alert: QuantumApiHigh5xxRate
        expr: |
          (
            sum(rate(quantum_api_http_requests_total{status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(quantum_api_http_requests_total[5m])), 1)
          ) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Quantum API 5xx rate is above 1%"
          description: "Investigate upstream dependency health, Redis connectivity, and runtime failures."

      - alert: QuantumApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(quantum_api_http_request_duration_seconds_bucket[5m])) by (le, path)
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Quantum API p95 latency is high"
          description: "p95 latency exceeded 2 seconds for at least 10 minutes."

      - alert: QuantumApiRateLimitSpike
        expr: |
          sum(rate(quantum_api_rate_limit_rejections_total[5m])) > 5
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Quantum API rate-limit rejections are elevated"
          description: "Potential abuse or quota saturation detected."

      - alert: QuantumApiInFlightPressure
        expr: quantum_api_http_in_flight_requests > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Quantum API in-flight pressure is high"
          description: "Queue pressure proxy exceeded 200 in-flight requests."
